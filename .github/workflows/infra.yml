name: Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/infra.yml"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infrastructure
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_postgres_admin_login: ${{ secrets.POSTGRES_ADMIN_LOGIN }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_jwt_signing_key: ${{ secrets.JWT_SIGNING_KEY }}
      TF_VAR_enable_key_vault: ${{ vars.TF_ENABLE_KEY_VAULT || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write backend config
        shell: bash
        run: |
          cat <<EOF > backend.hcl
          resource_group_name  = "${{ vars.TF_STATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TF_STATE_CONTAINER }}"
          key                  = "${{ vars.TF_STATE_KEY }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Fmt
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="dev.tfvars"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file="dev.tfvars"
